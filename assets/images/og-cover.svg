<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="sky" cx="50%" cy="60%" r="75%">
      <stop offset="0%" stop-color="#0d1e38"/>
      <stop offset="100%" stop-color="#030614"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,247,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(0,247,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#sky)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Star field -->
  <circle cx="120" cy="80"  r="1.5" fill="rgba(255,255,255,0.8)"/>
  <circle cx="340" cy="45"  r="1"   fill="rgba(255,255,255,0.6)"/>
  <circle cx="560" cy="90"  r="2"   fill="rgba(255,255,255,0.7)"/>
  <circle cx="780" cy="55"  r="1.5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="950" cy="70"  r="1"   fill="rgba(255,255,255,0.5)"/>
  <circle cx="1080" cy="40" r="1.5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="200"  cy="150" r="1"  fill="rgba(255,255,255,0.5)"/>
  <circle cx="450"  cy="130" r="1.5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="680"  cy="160" r="1"  fill="rgba(255,255,255,0.5)"/>
  <circle cx="900"  cy="120" r="2"  fill="rgba(255,255,255,0.8)"/>
  <circle cx="1100" cy="170" r="1"  fill="rgba(255,255,255,0.5)"/>
  <circle cx="70"   cy="300" r="1"  fill="rgba(255,255,255,0.4)"/>
  <circle cx="1150" cy="280" r="1.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="300"  cy="480" r="1"  fill="rgba(255,255,255,0.4)"/>
  <circle cx="900"  cy="500" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="1050" cy="420" r="1"  fill="rgba(255,255,255,0.5)"/>
  <circle cx="150"  cy="520" r="1"  fill="rgba(255,255,255,0.35)"/>

  <!-- Nā Hiku (Big Dipper) — upper right area -->
  <line x1="820" y1="110" x2="860" y2="100" stroke="rgba(0,247,255,0.45)" stroke-width="1.5"/>
  <line x1="860" y1="100" x2="900" y2="105" stroke="rgba(0,247,255,0.45)" stroke-width="1.5"/>
  <line x1="900" y1="105" x2="895" y2="130" stroke="rgba(0,247,255,0.45)" stroke-width="1.5"/>
  <line x1="895" y1="130" x2="855" y2="135" stroke="rgba(0,247,255,0.45)" stroke-width="1.5"/>
  <line x1="855" y1="135" x2="820" y2="110" stroke="rgba(0,247,255,0.45)" stroke-width="1.5"/>
  <line x1="900" y1="105" x2="930" y2="118" stroke="rgba(0,247,255,0.45)" stroke-width="1.5"/>
  <line x1="930" y1="118" x2="960" y2="138" stroke="rgba(0,247,255,0.40)" stroke-width="1.5"/>
  <line x1="960" y1="138" x2="985" y2="162" stroke="rgba(0,247,255,0.35)" stroke-width="1.5"/>
  <circle cx="820" cy="110" r="4" fill="#00f7ff"/>
  <circle cx="860" cy="100" r="4" fill="#00f7ff"/>
  <circle cx="900" cy="105" r="5" fill="#00f7ff"/>
  <circle cx="895" cy="130" r="3.5" fill="rgba(0,247,255,0.85)"/>
  <circle cx="855" cy="135" r="3.5" fill="rgba(0,247,255,0.85)"/>
  <circle cx="930" cy="118" r="3.5" fill="rgba(0,247,255,0.75)"/>
  <circle cx="960" cy="138" r="3"   fill="rgba(0,247,255,0.65)"/>
  <circle cx="985" cy="162" r="3"   fill="rgba(0,247,255,0.55)"/>

  <!-- Pointer to Hōkūpaʻa -->
  <line x1="820" y1="110" x2="760" y2="68" stroke="rgba(232,201,106,0.3)" stroke-width="1" stroke-dasharray="4 6"/>
  <line x1="855" y1="135" x2="760" y2="68" stroke="rgba(232,201,106,0.3)" stroke-width="1" stroke-dasharray="4 6"/>
  <circle cx="760" cy="68" r="7" fill="#e8c96a" opacity="0.9"/>
  <circle cx="760" cy="68" r="3" fill="white"/>

  <!-- Pleiades cluster — upper left -->
  <circle cx="220" cy="108" r="4"   fill="rgba(232,201,106,0.95)"/>
  <circle cx="236" cy="98"  r="3.5" fill="rgba(232,201,106,0.9)"/>
  <circle cx="234" cy="116" r="3"   fill="rgba(232,201,106,0.8)"/>
  <circle cx="250" cy="108" r="4"   fill="rgba(232,201,106,0.95)"/>
  <circle cx="248" cy="122" r="2.5" fill="rgba(232,201,106,0.7)"/>
  <circle cx="264" cy="100" r="3"   fill="rgba(232,201,106,0.8)"/>
  <circle cx="262" cy="116" r="2.5" fill="rgba(232,201,106,0.65)"/>

  <!-- Horizon line -->
  <line x1="0" y1="480" x2="1200" y2="480" stroke="rgba(0,247,255,0.12)" stroke-width="1"/>
  <rect x="0" y="480" width="1200" height="150" fill="rgba(3,6,20,0.4)"/>

  <!-- Left: logo + name -->
  <text x="80" y="310" font-family="'Rajdhani', 'Orbitron', monospace" font-size="82" font-weight="800" fill="rgba(0,247,255,0.95)" letter-spacing="-2">IkeStar</text>
  <text x="82" y="358" font-family="'Rajdhani', 'Orbitron', monospace" font-size="26" font-weight="400" fill="rgba(0,247,255,0.55)" letter-spacing="6">HAWAIIAN NIGHT SKY OBSERVATORY</text>

  <!-- Tagline -->
  <text x="80" y="410" font-family="Georgia, serif" font-size="20" fill="rgba(200,220,240,0.7)" letter-spacing="0.5">Nā Hōkū Hawaiʻi · Star formations, navigation, and the lunar calendar</text>

  <!-- Right: feature pills -->
  <rect x="760" y="270" width="360" height="36" rx="18" fill="rgba(0,247,255,0.08)" stroke="rgba(0,247,255,0.25)" stroke-width="1"/>
  <text x="940" y="293" text-anchor="middle" font-family="monospace" font-size="13" fill="rgba(0,247,255,0.8)" letter-spacing="1">Hawaiian Star Formations</text>

  <rect x="760" y="318" width="360" height="36" rx="18" fill="rgba(0,247,255,0.08)" stroke="rgba(0,247,255,0.25)" stroke-width="1"/>
  <text x="940" y="341" text-anchor="middle" font-family="monospace" font-size="13" fill="rgba(0,247,255,0.8)" letter-spacing="1">Lunar Night Calendar</text>

  <rect x="760" y="366" width="360" height="36" rx="18" fill="rgba(0,247,255,0.08)" stroke="rgba(0,247,255,0.25)" stroke-width="1"/>
  <text x="940" y="389" text-anchor="middle" font-family="monospace" font-size="13" fill="rgba(0,247,255,0.8)" letter-spacing="1">7 Modules · 23 Lessons</text>

  <rect x="760" y="414" width="360" height="36" rx="18" fill="rgba(232,201,106,0.07)" stroke="rgba(232,201,106,0.25)" stroke-width="1"/>
  <text x="940" y="437" text-anchor="middle" font-family="monospace" font-size="13" fill="rgba(232,201,106,0.8)" letter-spacing="1">Free · Installable · Hawaiʻi 21°N</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,247,255,0.04)" stroke="none"/>
  <text x="80" y="612" font-family="monospace" font-size="14" fill="rgba(0,247,255,0.4)" letter-spacing="1">ikestar.app</text>
  <text x="1120" y="612" text-anchor="end" font-family="monospace" font-size="14" fill="rgba(232,201,106,0.4)" letter-spacing="1">Kanaka Maoli Sky</text>
</svg>
