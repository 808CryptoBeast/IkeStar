<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#0d1e38"/>
      <stop offset="100%" stop-color="#030614"/>
    </radialGradient>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f7ff"/>
      <stop offset="100%" stop-color="#e8c96a"/>
    </linearGradient>
    <filter id="glow1" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="96" fill="url(#bg1)"/>
  <!-- Outer ring gradient -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#ring1)" stroke-width="3.5"/>
  <!-- Inner accent ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(0,247,255,0.12)" stroke-width="1"/>

  <!-- Central eye / observation symbol -->
  <ellipse cx="100" cy="95" rx="32" ry="18" fill="none" stroke="rgba(0,247,255,0.7)" stroke-width="2"/>
  <circle cx="100" cy="95" r="10" fill="none" stroke="rgba(0,247,255,0.9)" stroke-width="2"/>
  <circle cx="100" cy="95" r="4" fill="#00f7ff"/>

  <!-- 8 radiating rays -->
  <line x1="100" y1="95" x2="100" y2="60" stroke="rgba(232,201,106,0.6)" stroke-width="1.5"/>
  <line x1="100" y1="95" x2="100" y2="130" stroke="rgba(232,201,106,0.6)" stroke-width="1.5"/>
  <line x1="100" y1="95" x2="65" y2="95" stroke="rgba(232,201,106,0.6)" stroke-width="1.5"/>
  <line x1="100" y1="95" x2="135" y2="95" stroke="rgba(232,201,106,0.6)" stroke-width="1.5"/>
  <line x1="100" y1="95" x2="77" y2="72" stroke="rgba(232,201,106,0.35)" stroke-width="1"/>
  <line x1="100" y1="95" x2="123" y2="72" stroke="rgba(232,201,106,0.35)" stroke-width="1"/>
  <line x1="100" y1="95" x2="77" y2="118" stroke="rgba(232,201,106,0.35)" stroke-width="1"/>
  <line x1="100" y1="95" x2="123" y2="118" stroke="rgba(232,201,106,0.35)" stroke-width="1"/>

  <!-- Small stars scattered -->
  <circle cx="58" cy="58" r="2" fill="rgba(255,255,255,0.7)"/>
  <circle cx="142" cy="62" r="1.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="52" cy="128" r="1.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="148" cy="130" r="2" fill="rgba(255,255,255,0.6)"/>
  <circle cx="72" cy="142" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="130" cy="148" r="1" fill="rgba(255,255,255,0.4)"/>

  <!-- Badge label -->
  <text x="100" y="155" text-anchor="middle" font-family="'Rajdhani', 'Orbitron', monospace" font-size="8.5" font-weight="700" fill="rgba(0,247,255,0.75)" letter-spacing="2.5">BEGIN WITH THE SKY</text>
  <text x="100" y="168" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(232,201,106,0.7)" letter-spacing="1.5">COMPLETE</text>
</svg>
