<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#0d2030"/>
      <stop offset="100%" stop-color="#030614"/>
    </radialGradient>
    <linearGradient id="ring2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c96a"/>
      <stop offset="100%" stop-color="#00f7ff"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="96" fill="url(#bg2)"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#ring2)" stroke-width="3.5"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(232,201,106,0.1)" stroke-width="1"/>

  <!-- Circular map grid — horizon rings -->
  <circle cx="100" cy="95" r="40" fill="none" stroke="rgba(0,247,255,0.2)" stroke-width="1" stroke-dasharray="3 4"/>
  <circle cx="100" cy="95" r="24" fill="none" stroke="rgba(0,247,255,0.25)" stroke-width="1" stroke-dasharray="2 3"/>

  <!-- Compass radials -->
  <line x1="100" y1="55" x2="100" y2="135" stroke="rgba(0,247,255,0.18)" stroke-width="1"/>
  <line x1="60" y1="95" x2="140" y2="95" stroke="rgba(0,247,255,0.18)" stroke-width="1"/>
  <line x1="72" y1="67" x2="128" y2="123" stroke="rgba(0,247,255,0.1)" stroke-width="1"/>
  <line x1="128" y1="67" x2="72" y2="123" stroke="rgba(0,247,255,0.1)" stroke-width="1"/>

  <!-- Formation dots — scattered like stars on a map -->
  <circle cx="100" cy="68" r="3" fill="#00f7ff"/>
  <circle cx="78" cy="80" r="2.5" fill="rgba(0,247,255,0.8)"/>
  <circle cx="122" cy="78" r="2" fill="rgba(0,247,255,0.7)"/>
  <circle cx="115" cy="100" r="2.5" fill="#e8c96a"/>
  <circle cx="85" cy="105" r="2" fill="rgba(0,247,255,0.6)"/>
  <circle cx="95" cy="118" r="2" fill="rgba(232,201,106,0.7)"/>
  <circle cx="108" cy="112" r="1.5" fill="rgba(0,247,255,0.5)"/>

  <!-- Connecting lines between some dots -->
  <line x1="100" y1="68" x2="78" y2="80" stroke="rgba(0,247,255,0.35)" stroke-width="1"/>
  <line x1="78" y1="80" x2="85" y2="105" stroke="rgba(0,247,255,0.25)" stroke-width="1"/>
  <line x1="100" y1="68" x2="122" y2="78" stroke="rgba(0,247,255,0.3)" stroke-width="1"/>
  <line x1="115" y1="100" x2="108" y2="112" stroke="rgba(232,201,106,0.35)" stroke-width="1"/>

  <!-- North marker -->
  <text x="100" y="52" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(232,201,106,0.8)" letter-spacing="1">N</text>

  <text x="100" y="155" text-anchor="middle" font-family="'Rajdhani', 'Orbitron', monospace" font-size="8" font-weight="700" fill="rgba(232,201,106,0.75)" letter-spacing="2">HAWAIIAN SKY MAP</text>
  <text x="100" y="168" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(0,247,255,0.7)" letter-spacing="1.5">COMPLETE</text>
</svg>
