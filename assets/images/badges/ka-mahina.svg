<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg7" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#0c1020"/>
      <stop offset="100%" stop-color="#030614"/>
    </radialGradient>
    <linearGradient id="ring7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8d8f0"/>
      <stop offset="50%" stop-color="#e8c96a"/>
      <stop offset="100%" stop-color="#00f7ff"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="96" fill="url(#bg7)"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#ring7)" stroke-width="3.5"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(200,216,240,0.08)" stroke-width="1"/>

  <!-- Crescent moon — upper right -->
  <circle cx="115" cy="76" r="22" fill="rgba(200,216,240,0.12)" stroke="rgba(200,216,240,0.45)" stroke-width="1.5"/>
  <circle cx="124" cy="72" r="18" fill="#030614"/>

  <!-- Makali'i / Pleiades — seven stars cluster, lower left -->
  <!-- Classic Pleiades arrangement -->
  <circle cx="72" cy="102" r="3.5" fill="rgba(232,201,106,0.95)"/>
  <circle cx="82" cy="96" r="3" fill="rgba(232,201,106,0.9)"/>
  <circle cx="80" cy="108" r="2.5" fill="rgba(232,201,106,0.8)"/>
  <circle cx="90" cy="100" r="3.5" fill="rgba(232,201,106,0.95)"/>
  <circle cx="88" cy="112" r="2" fill="rgba(232,201,106,0.7)"/>
  <circle cx="98" cy="96" r="2.5" fill="rgba(232,201,106,0.8)"/>
  <circle cx="96" cy="108" r="2" fill="rgba(232,201,106,0.65)"/>

  <!-- Subtle label for Makali'i -->
  <text x="84" y="125" text-anchor="middle" font-family="monospace" font-size="6.5" fill="rgba(232,201,106,0.6)">Makaliʻi</text>

  <!-- 30 moon-night marks — thin arc of small dots along the bottom interior -->
  <!-- Simplified: 6 dots representing the moon night cycle rhythm -->
  <circle cx="68" cy="128" r="2" fill="rgba(200,216,240,0.5)"/>
  <circle cx="78" cy="133" r="2" fill="rgba(200,216,240,0.45)"/>
  <circle cx="88" cy="136" r="2.5" fill="rgba(200,216,240,0.6)"/>
  <circle cx="100" cy="137" r="2.5" fill="rgba(200,216,240,0.7)"/>
  <circle cx="112" cy="135" r="2" fill="rgba(200,216,240,0.5)"/>
  <circle cx="122" cy="131" r="2" fill="rgba(200,216,240,0.45)"/>
  <circle cx="132" cy="125" r="1.5" fill="rgba(200,216,240,0.35)"/>

  <!-- Dotted arc connecting them -->
  <path d="M68,128 Q100,145 132,125" fill="none" stroke="rgba(200,216,240,0.2)" stroke-width="1" stroke-dasharray="2 4"/>

  <!-- Background stars -->
  <circle cx="56" cy="75" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="140" cy="110" r="1.5" fill="rgba(255,255,255,0.35)"/>
  <circle cx="58" cy="105" r="1" fill="rgba(255,255,255,0.3)"/>

  <text x="100" y="156" text-anchor="middle" font-family="'Rajdhani', 'Orbitron', monospace" font-size="8.5" font-weight="700" fill="rgba(200,216,240,0.75)" letter-spacing="2">KA MAHINA</text>
  <text x="100" y="169" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(232,201,106,0.7)" letter-spacing="1.5">COMPLETE</text>
</svg>
