<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140">
  <defs>
    <radialGradient id="bg-k" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0e2e"/>
      <stop offset="100%" stop-color="#0a0614"/>
    </radialGradient>
    <radialGradient id="sop" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe070"/>
      <stop offset="60%" stop-color="#e8b820"/>
      <stop offset="100%" stop-color="#a07010"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="70" cy="70" r="68" fill="url(#bg-k)" stroke="#c9960a" stroke-width="2.5"/>
  <!-- Decorative outer ring dots -->
  <circle cx="70" cy="4"  r="2.5" fill="#c9960a" opacity="0.7"/>
  <circle cx="70" cy="136" r="2.5" fill="#c9960a" opacity="0.7"/>
  <circle cx="4"  cy="70" r="2.5" fill="#c9960a" opacity="0.7"/>
  <circle cx="136" cy="70" r="2.5" fill="#c9960a" opacity="0.7"/>
  <!-- Eye of Horus / Udjet — simplified -->
  <ellipse cx="70" cy="52" rx="22" ry="13" fill="none" stroke="#e8b820" stroke-width="2"/>
  <circle cx="70" cy="52" r="7" fill="#e8b820" opacity="0.9"/>
  <circle cx="70" cy="52" r="3.5" fill="#1a0e2e"/>
  <!-- Tear-mark below eye (Udjet signature) -->
  <path d="M70 65 Q65 76 67 82" stroke="#e8b820" stroke-width="2" fill="none"/>
  <path d="M70 65 Q75 74 73 79" stroke="#e8b820" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Sirius / Sopdet star — bright 8-point star -->
  <g transform="translate(70,100)">
    <line x1="0" y1="-9"  x2="0"  y2="9"   stroke="#ffe070" stroke-width="2"/>
    <line x1="-9" y1="0"  x2="9"  y2="0"   stroke="#ffe070" stroke-width="2"/>
    <line x1="-6.5" y1="-6.5" x2="6.5" y2="6.5" stroke="#ffe070" stroke-width="1.5"/>
    <line x1="6.5" y1="-6.5" x2="-6.5" y2="6.5" stroke="#ffe070" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="3.5" fill="url(#sop)"/>
  </g>
  <!-- Orion belt dots (Sah) -->
  <circle cx="53" cy="30" r="2.5" fill="#c8e0ff" opacity="0.85"/>
  <circle cx="70" cy="27" r="2.5" fill="#c8e0ff" opacity="0.85"/>
  <circle cx="87" cy="30" r="2.5" fill="#c8e0ff" opacity="0.85"/>
  <line x1="53" y1="30" x2="70" y2="27" stroke="#c8e0ff" stroke-width="1" opacity="0.5"/>
  <line x1="70" y1="27" x2="87" y2="30" stroke="#c8e0ff" stroke-width="1" opacity="0.5"/>
  <!-- Label -->
  <text x="70" y="125" text-anchor="middle" font-family="serif" font-size="8" fill="#c9960a" letter-spacing="1">KEMET SKY</text>
</svg>
