<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140">
  <defs>
    <radialGradient id="bg-kd" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0e2e"/>
      <stop offset="100%" stop-color="#030614"/>
    </radialGradient>
    <radialGradient id="dec-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe0a0"/>
      <stop offset="100%" stop-color="#c9960a"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="70" cy="70" r="68" fill="url(#bg-kd)" stroke="#c9960a" stroke-width="2.5"/>
  <!-- Outer ring of 36 decan dots -->
  <g opacity="0.6">
    <circle cx="70" cy="5"  r="1.8" fill="#c9960a"/>
    <circle cx="80.4" cy="6.3" r="1.8" fill="#c9960a"/>
    <circle cx="90.2" cy="10.2" r="1.8" fill="#c9960a"/>
    <circle cx="98.9" cy="16.6" r="1.8" fill="#c9960a"/>
    <circle cx="105.8" cy="24.9" r="1.8" fill="#c9960a"/>
    <circle cx="110.4" cy="34.6" r="1.8" fill="#c9960a"/>
    <circle cx="112.3" cy="45" r="1.8" fill="#c9960a"/>
    <circle cx="111.3" cy="55.5" r="1.8" fill="#c9960a"/>
    <circle cx="107.4" cy="65.5" r="1.8" fill="#c9960a"/>
    <circle cx="101.1" cy="74.4" r="1.8" fill="#c9960a"/>
    <circle cx="92.7" cy="81.7" r="1.8" fill="#c9960a"/>
    <circle cx="82.8" cy="86.9" r="1.8" fill="#c9960a"/>
    <circle cx="71.9" cy="89.6" r="1.8" fill="#c9960a"/>
    <circle cx="60.8" cy="89.4" r="1.8" fill="#c9960a"/>
    <circle cx="50.2" cy="86.3" r="1.8" fill="#c9960a"/>
    <circle cx="40.5" cy="80.8" r="1.8" fill="#c9960a"/>
    <circle cx="32.4" cy="73.2" r="1.8" fill="#c9960a"/>
    <circle cx="26.4" cy="64.1" r="1.8" fill="#c9960a"/>
    <circle cx="22.9" cy="54" r="1.8" fill="#c9960a"/>
    <circle cx="22" cy="43.5" r="1.8" fill="#c9960a"/>
    <circle cx="24" cy="33.2" r="1.8" fill="#c9960a"/>
    <circle cx="28.8" cy="23.8" r="1.8" fill="#c9960a"/>
    <circle cx="35.9" cy="16" r="1.8" fill="#c9960a"/>
    <circle cx="44.9" cy="10.1" r="1.8" fill="#c9960a"/>
    <circle cx="54.9" cy="6.5" r="1.8" fill="#c9960a"/>
    <circle cx="65" cy="5.3" r="1.8" fill="#c9960a"/>
    <!-- Second half highlighted — 36 total, 10 days each = 360 days -->
    <circle cx="75" cy="5.3" r="1.8" fill="#e8c96a" opacity="0.9"/>
    <circle cx="85" cy="7.5" r="1.8" fill="#e8c96a" opacity="0.8"/>
    <circle cx="94.2" cy="12.8" r="1.8" fill="#e8c96a" opacity="0.7"/>
    <circle cx="102" cy="20.6" r="1.8" fill="#e8c96a" opacity="0.6"/>
    <circle cx="108" cy="30.3" r="1.8" fill="#e8c96a" opacity="0.5"/>
  </g>
  <!-- Calendar grid — 36 decan squares (simplified 6x6 grid) -->
  <g opacity="0.3" stroke="#c9960a" stroke-width="0.5" fill="none">
    <line x1="38" y1="30" x2="102" y2="30"/>
    <line x1="38" y1="37" x2="102" y2="37"/>
    <line x1="38" y1="44" x2="102" y2="44"/>
    <line x1="38" y1="51" x2="102" y2="51"/>
    <line x1="38" y1="58" x2="102" y2="58"/>
    <line x1="38" y1="65" x2="102" y2="65"/>
    <line x1="38" y1="72" x2="102" y2="72"/>
    <line x1="38" y1="30" x2="38" y2="72"/>
    <line x1="49" y1="30" x2="49" y2="72"/>
    <line x1="60" y1="30" x2="60" y2="72"/>
    <line x1="71" y1="30" x2="71" y2="72"/>
    <line x1="82" y1="30" x2="82" y2="72"/>
    <line x1="93" y1="30" x2="93" y2="72"/>
    <line x1="102" y1="30" x2="102" y2="72"/>
  </g>
  <!-- Central Sirius / Sopdet star -->
  <g transform="translate(70,51)">
    <line x1="0" y1="-8" x2="0" y2="8"   stroke="#ffe070" stroke-width="2"/>
    <line x1="-8" y1="0" x2="8" y2="0"   stroke="#ffe070" stroke-width="2"/>
    <line x1="-5.7" y1="-5.7" x2="5.7" y2="5.7" stroke="#ffe070" stroke-width="1.2"/>
    <line x1="5.7" y1="-5.7" x2="-5.7" y2="5.7" stroke="#ffe070" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="3" fill="url(#dec-glow)"/>
  </g>
  <!-- Horizon line — heliacal rising -->
  <line x1="30" y1="74" x2="110" y2="74" stroke="#c9960a" stroke-width="1.5" opacity="0.5" stroke-dasharray="3 2"/>
  <!-- Label -->
  <text x="70" y="90" text-anchor="middle" font-family="serif" font-size="6.5" fill="#c9960a" letter-spacing="1.5">36 DECANS</text>
  <text x="70" y="100" text-anchor="middle" font-family="serif" font-size="6" fill="#8ecae6" letter-spacing="1">STAR CLOCK</text>
</svg>
