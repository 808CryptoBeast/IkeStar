<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg5" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#0a1624"/>
      <stop offset="100%" stop-color="#030614"/>
    </radialGradient>
    <linearGradient id="ring5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f7ff"/>
      <stop offset="100%" stop-color="#7cd4f0"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="96" fill="url(#bg5)"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#ring5)" stroke-width="3.5"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(0,247,255,0.1)" stroke-width="1"/>

  <!-- Shield shape -->
  <path d="M100,60 L130,70 L130,95 Q130,118 100,132 Q70,118 70,95 L70,70 Z"
        fill="rgba(0,247,255,0.07)" stroke="rgba(0,247,255,0.45)" stroke-width="2"/>

  <!-- Check mark inside shield -->
  <polyline points="82,95 95,110 122,78"
            fill="none" stroke="#00f7ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Verified star top of shield -->
  <circle cx="100" cy="60" r="6" fill="#030614" stroke="rgba(0,247,255,0.5)" stroke-width="1.5"/>
  <circle cx="100" cy="60" r="3" fill="rgba(0,247,255,0.8)"/>

  <!-- Status dots on the side (like knowledge badges) -->
  <circle cx="62" cy="80" r="3" fill="rgba(60,200,120,0.8)"/>
  <text x="70" y="84" font-family="monospace" font-size="6.5" fill="rgba(60,200,120,0.7)">Verified</text>
  <circle cx="62" cy="96" r="3" fill="rgba(0,247,255,0.6)"/>
  <text x="70" y="100" font-family="monospace" font-size="6.5" fill="rgba(0,247,255,0.6)">Encoded</text>
  <circle cx="62" cy="112" r="3" fill="rgba(232,201,106,0.6)"/>
  <text x="70" y="116" font-family="monospace" font-size="6.5" fill="rgba(232,201,106,0.6)">Review</text>

  <!-- Small star field -->
  <circle cx="148" cy="72" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="55" cy="130" r="1.2" fill="rgba(255,255,255,0.35)"/>
  <circle cx="150" cy="118" r="1" fill="rgba(255,255,255,0.3)"/>

  <text x="100" y="156" text-anchor="middle" font-family="'Rajdhani', 'Orbitron', monospace" font-size="8.5" font-weight="700" fill="rgba(0,247,255,0.75)" letter-spacing="2">KNOWLEDGE CARE</text>
  <text x="100" y="169" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(0,247,255,0.7)" letter-spacing="1.5">COMPLETE</text>
</svg>
