<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg6" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#060e24"/>
      <stop offset="100%" stop-color="#030614"/>
    </radialGradient>
    <linearGradient id="ring6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c96a"/>
      <stop offset="100%" stop-color="#00f7ff"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="96" fill="url(#bg6)"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#ring6)" stroke-width="3.5"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(232,201,106,0.1)" stroke-width="1"/>

  <!-- Vertical meridian / zenith line -->
  <line x1="100" y1="45" x2="100" y2="135" stroke="rgba(0,247,255,0.2)" stroke-width="1" stroke-dasharray="3 5"/>

  <!-- Hōkūpaʻa (Polaris) — north, near top -->
  <circle cx="100" cy="52" r="8" fill="rgba(232,201,106,0.15)" stroke="rgba(232,201,106,0.6)" stroke-width="1.5"/>
  <circle cx="100" cy="52" r="4" fill="#e8c96a"/>
  <text x="113" y="56" font-family="monospace" font-size="7" fill="rgba(232,201,106,0.7)">Hōkūpaʻa</text>

  <!-- Nā Hiku (Big Dipper) — midfield -->
  <line x1="72" y1="85" x2="88" y2="81" stroke="rgba(0,247,255,0.5)" stroke-width="1.5"/>
  <line x1="88" y1="81" x2="104" y2="83" stroke="rgba(0,247,255,0.5)" stroke-width="1.5"/>
  <line x1="104" y1="83" x2="100" y2="97" stroke="rgba(0,247,255,0.5)" stroke-width="1.5"/>
  <line x1="100" y1="97" x2="84" y2="99" stroke="rgba(0,247,255,0.5)" stroke-width="1.5"/>
  <line x1="84" y1="99" x2="72" y2="85" stroke="rgba(0,247,255,0.5)" stroke-width="1.5"/>
  <line x1="104" y1="83" x2="118" y2="92" stroke="rgba(0,247,255,0.5)" stroke-width="1.5"/>
  <line x1="118" y1="92" x2="128" y2="105" stroke="rgba(0,247,255,0.4)" stroke-width="1.5"/>
  <circle cx="72" cy="85" r="3" fill="#00f7ff"/>
  <circle cx="88" cy="81" r="3" fill="#00f7ff"/>
  <circle cx="104" cy="83" r="3.5" fill="#00f7ff"/>
  <circle cx="100" cy="97" r="3" fill="rgba(0,247,255,0.8)"/>
  <circle cx="84" cy="99" r="3" fill="rgba(0,247,255,0.8)"/>
  <circle cx="118" cy="92" r="3" fill="rgba(0,247,255,0.7)"/>
  <circle cx="128" cy="105" r="2.5" fill="rgba(0,247,255,0.6)"/>

  <!-- Pointer arrow from bowl to Polaris -->
  <line x1="72" y1="85" x2="100" y2="58" stroke="rgba(232,201,106,0.3)" stroke-width="1" stroke-dasharray="2 4"/>
  <line x1="88" y1="81" x2="100" y2="58" stroke="rgba(232,201,106,0.3)" stroke-width="1" stroke-dasharray="2 4"/>
  <text x="56" y="82" font-family="monospace" font-size="6.5" fill="rgba(0,247,255,0.6)">Nā Hiku</text>

  <!-- Hōkūleʻa (Arcturus) — south, lower -->
  <circle cx="100" cy="122" r="7" fill="rgba(255,200,120,0.15)" stroke="rgba(255,200,120,0.55)" stroke-width="1.5"/>
  <circle cx="100" cy="122" r="3.5" fill="rgba(255,200,120,0.9)"/>
  <text x="113" y="126" font-family="monospace" font-size="6.5" fill="rgba(255,200,120,0.65)">Hōkūleʻa</text>

  <!-- Vertical connecting line (navigation meridian) -->
  <line x1="100" y1="60" x2="100" y2="115" stroke="rgba(255,200,120,0.2)" stroke-width="1.5"/>

  <!-- Background stars -->
  <circle cx="55" cy="65" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="148" cy="60" r="1.2" fill="rgba(255,255,255,0.35)"/>
  <circle cx="52" cy="120" r="1.2" fill="rgba(255,255,255,0.3)"/>
  <circle cx="150" cy="128" r="1" fill="rgba(255,255,255,0.3)"/>

  <text x="100" y="156" text-anchor="middle" font-family="'Rajdhani', 'Orbitron', monospace" font-size="8" font-weight="700" fill="rgba(232,201,106,0.75)" letter-spacing="2">STAR LINES &amp; NAV</text>
  <text x="100" y="169" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(0,247,255,0.7)" letter-spacing="1.5">COMPLETE</text>
</svg>
