<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140">
  <defs>
    <radialGradient id="bg-ks" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0e1a2e"/>
      <stop offset="100%" stop-color="#030614"/>
    </radialGradient>
    <radialGradient id="pole" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#8ecae6"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="70" cy="70" r="68" fill="url(#bg-ks)" stroke="#8ecae6" stroke-width="2.5"/>
  <!-- Circumpolar rotation rings -->
  <circle cx="70" cy="70" r="42" fill="none" stroke="#8ecae6" stroke-width="0.8" stroke-dasharray="3 5" opacity="0.35"/>
  <circle cx="70" cy="70" r="28" fill="none" stroke="#8ecae6" stroke-width="0.8" stroke-dasharray="2 4" opacity="0.25"/>
  <!-- North pole star (Thuban-era pole) -->
  <circle cx="70" cy="70" r="5" fill="url(#pole)" opacity="0.95"/>
  <circle cx="70" cy="70" r="9" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <!-- Big Dipper / Meseket — rotating around pole -->
  <!-- Bowl -->
  <circle cx="100" cy="45" r="3" fill="#e8c96a" opacity="0.9"/>
  <circle cx="110" cy="55" r="3" fill="#e8c96a" opacity="0.9"/>
  <circle cx="106" cy="68" r="3" fill="#e8c96a" opacity="0.9"/>
  <circle cx="93"  cy="66" r="3" fill="#e8c96a" opacity="0.9"/>
  <line x1="100" y1="45" x2="110" y2="55" stroke="#e8c96a" stroke-width="1.5" opacity="0.7"/>
  <line x1="110" y1="55" x2="106" y2="68" stroke="#e8c96a" stroke-width="1.5" opacity="0.7"/>
  <line x1="106" y1="68" x2="93"  y2="66" stroke="#e8c96a" stroke-width="1.5" opacity="0.7"/>
  <line x1="93"  y1="66" x2="100" y2="45" stroke="#e8c96a" stroke-width="1.5" opacity="0.7"/>
  <!-- Handle -->
  <circle cx="85"  cy="58" r="2.5" fill="#e8c96a" opacity="0.8"/>
  <circle cx="80"  cy="48" r="2.5" fill="#e8c96a" opacity="0.7"/>
  <circle cx="82"  cy="37" r="2.5" fill="#e8c96a" opacity="0.6"/>
  <line x1="93"  y1="66" x2="85" y2="58" stroke="#e8c96a" stroke-width="1.2" opacity="0.6"/>
  <line x1="85"  y1="58" x2="80" y2="48" stroke="#e8c96a" stroke-width="1.2" opacity="0.6"/>
  <line x1="80"  y1="48" x2="82" y2="37" stroke="#e8c96a" stroke-width="1.2" opacity="0.55"/>
  <!-- Rotation arrow hint -->
  <path d="M 35 70 A 35 35 0 0 1 70 35" stroke="#8ecae6" stroke-width="1.5" fill="none" opacity="0.4" stroke-dasharray="2 3"/>
  <!-- Ankh symbol — eternal life -->
  <circle cx="32" cy="100" r="8" fill="none" stroke="#c9960a" stroke-width="2"/>
  <line x1="32" y1="108" x2="32" y2="128" stroke="#c9960a" stroke-width="2"/>
  <line x1="24" y1="114" x2="40" y2="114" stroke="#c9960a" stroke-width="2"/>
  <!-- Label -->
  <text x="70" y="130" text-anchor="middle" font-family="serif" font-size="7.5" fill="#8ecae6" letter-spacing="1">IMPERISHABLE</text>
</svg>
